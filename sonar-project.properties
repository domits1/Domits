sonar.projectKey=domits1_Domits
sonar.organization=domits1

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Domits
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=./frontend/web/src,./frontend/app/Domits/src,./backend

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude compiled output, dependencies, and generated files
sonar.exclusions=**/index.css,**/index.css.map,**/node_modules/**,**/build/**,**/dist/**

# Suppress S6747 (JSX unknown property) for bookingContainer — Sonar's JSX parser
# produces false positives by misreading JSX expression content as attribute names
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S6747
sonar.issue.ignore.multicriteria.e1.resourceKey=**/bookingContainer.js
